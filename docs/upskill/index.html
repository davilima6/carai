<!DOCTYPE html>
<html lang="en" class="dark">
<head>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'Georgia', 'serif'],
                        sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                        mono: ['"Fira Code"', 'monospace'],
                    },
                    colors: {
                        interceptRed: '#E11D48',
                        agentBlue: '#3B82F6',
                        agentEmerald: '#10B981',
                        agentAmber: '#F59E0B',
                        journalBlack: '#0F0F11',
                    }
                }
            }
        }
    </script>
    <style>
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Barra de rolamento personalizada */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4B5563;
            border-radius: 3px;
        }

        /* Regras de escala agressiva para o modo Ecrã Inteiro (Fullscreen) */
        .fullscreen-active #slide-content-frame {
            padding: 2.5rem;
        }
        .fullscreen-active h2 {
            font-size: 2.75rem !important;
            margin-bottom: 2rem !important;
        }
        .fullscreen-active p,
        .fullscreen-active span,
        .fullscreen-active div,
        .fullscreen-active table,
        .fullscreen-active li {
            font-size: 1.25rem !important;
            line-height: 1.8 !important;
        }
        .fullscreen-active svg {
            transform: scale(1.4);
            margin-bottom: 3.5rem;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fullscreen-active .grid {
            gap: 2rem !important;
        }

        /* Custom Directional View Transitions API Animation Rules */
        #slide-content-frame {
            view-transition-name: slide-content;
        }

        /* Forward (Next) slide transition: slide left and fade */
        .nav-forward::view-transition-old(slide-content) {
            animation: 250ms cubic-bezier(0.4, 0, 0.2, 1) both fade-out,
                       250ms cubic-bezier(0.4, 0, 0.2, 1) both slide-out-to-left;
        }
        .nav-forward::view-transition-new(slide-content) {
            animation: 250ms cubic-bezier(0.4, 0, 0.2, 1) both fade-in,
                       250ms cubic-bezier(0.4, 0, 0.2, 1) both slide-in-from-right;
        }

        /* Backward (Back) slide transition: slide right and fade */
        .nav-backward::view-transition-old(slide-content) {
            animation: 250ms cubic-bezier(0.4, 0, 0.2, 1) both fade-out,
                       250ms cubic-bezier(0.4, 0, 0.2, 1) both slide-out-to-right;
        }
        .nav-backward::view-transition-new(slide-content) {
            animation: 250ms cubic-bezier(0.4, 0, 0.2, 1) both fade-in,
                       250ms cubic-bezier(0.4, 0, 0.2, 1) both slide-in-from-left;
        }

        @keyframes fade-out {
            to { opacity: 0; }
        }
        @keyframes fade-in {
            from { opacity: 0; }
        }
        @keyframes slide-out-to-left {
            to { transform: translateX(-40px); }
        }
        @keyframes slide-in-from-right {
            from { transform: translateX(40px); }
        }
        @keyframes slide-out-to-right {
            to { transform: translateX(40px); }
        }
        @keyframes slide-in-from-left {
            from { transform: translateX(-40px); }
        }
    </style>
</head>
<body class="font-sans bg-gray-50 text-journalBlack dark:bg-gray-950 dark:text-gray-100 transition-colors duration-500 overflow-x-hidden min-h-screen flex flex-col justify-between">

    <!-- Contentor Principal (Área Maximizada para os Slides) -->
    <main class="flex-grow flex flex-col items-center justify-center max-w-7xl w-full mx-auto p-4 md:p-6" id="workspace-container">
        
        <!-- Viewport do Slide (Ampliado para md:max-w-5xl lg:max-w-6xl) -->
        <section class="w-full md:max-w-5xl lg:max-w-6xl flex flex-col justify-between bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-6 md:p-8 shadow-sm relative min-h-[500px] md:min-h-[620px] lg:min-h-[680px] transition-all" id="slide-viewport">

            <div id="slide-header" class="flex items-center justify-between mb-4 border-b border-gray-100 dark:border-gray-800 pb-3">

                <span class="text-xs font-mono bg-gray-100 dark:bg-gray-800 px-2.5 py-1 rounded text-gray-600 dark:text-gray-300" id="slide-counter">SLIDE 1 OF 13</span>
            </div>

            <!-- Moldura Dinâmica de Conteúdo -->
            <div class="flex-grow flex flex-col justify-center items-center py-4" id="slide-content-frame">
                <!-- Gráficos e Textos Dinâmicos Injetados Aqui -->
            </div>

            <!-- Controlos de Navegação dos Slides -->
            <div id="slide-controls" class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-gray-800">
                <button id="prev-btn" onclick="prevSlide()" class="px-4 py-2 text-xs font-mono font-bold rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all text-gray-700 dark:text-gray-300 disabled:opacity-20 disabled:pointer-events-none">
                    &larr;
                </button>
                
                <!-- Indicadores Circulares -->
                <div class="flex space-x-1.5" id="navigation-dots">
                    <!-- Gerados Dinamicamente via JS -->
                </div>

                <button id="next-btn" onclick="nextSlide()" class="px-4 py-2 text-xs font-mono font-bold rounded-lg bg-rose-600 hover:bg-rose-700 text-white transition-all shadow-sm disabled:opacity-20 disabled:pointer-events-none">
                    &rarr;
                </button>
            </div>
        </section>
    </main>

    <!-- Gaveta de Notas do Orador Horizontal (Retrátil) -->

        let currentSlideIndex = 0;
        let presenterFontSize = 15; // Tamanho de fonte padrão
        let isSpeakerNotesCollapsed = false;
        let isFullscreenMode = false;

        // Estado dos gestos em dispositivos móveis
        let touchStartX = 0;
        let touchEndX = 0;

        window.onload = function() {
            renderSlide();
            setupKeyboardNavigation();
            setupTouchGestures();
        };

        // Renderiza o slide atual
        function renderSlide() {
            const slide = PRESENTATION_SLIDES[currentSlideIndex];
            const slideCounter = document.getElementById('slide-counter');
            const slideContentFrame = document.getElementById('slide-content-frame');
            const speakerScriptContainer = document.getElementById('speaker-drawer-content');
            const progressBar = document.getElementById('slide-progress');

            // Atualiza metadados do slide
            slideCounter.textContent = `SLIDE ${currentSlideIndex + 1} DE ${PRESENTATION_SLIDES.length}`;
            
            // Injeta gráficos e textos do slide
            slideContentFrame.innerHTML = slide.visual;

            // Injeta notas do orador
            speakerScriptContainer.textContent = slide.script;

            // Atualiza barra de progresso
            const progressPercent = ((currentSlideIndex + 1) / PRESENTATION_SLIDES.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            // Ativa/desativa botões de navegação conforme limite
            document.getElementById('prev-btn').disabled = (currentSlideIndex === 0);
            document.getElementById('next-btn').disabled = (currentSlideIndex === PRESENTATION_SLIDES.length - 1);

            // Redesenha os indicadores circulares
            drawDots();
        }

        // Navegar para slide seguinte
        function nextSlide() {
            if (currentSlideIndex < PRESENTATION_SLIDES.length - 1) {
                currentSlideIndex++;
                renderSlide();
            }
        }

        // Navegar para slide anterior
        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
            }
        }

        // Saltos rápidos para um slide específico
        function jumpToSlide(index) {
            currentSlideIndex = index;
            renderSlide();
        }

        // Desenha indicadores de navegação circulares
        function drawDots() {
            const dotsContainer = document.getElementById('navigation-dots');
            dotsContainer.innerHTML = '';
            
            PRESENTATION_SLIDES.forEach((_, index) => {
                const dot = document.createElement('button');
                dot.onclick = () => jumpToSlide(index);
                dot.className = `w-2 h-2 rounded-full transition-all duration-300 ${
                    index === currentSlideIndex 
                        ? 'bg-rose-600 scale-125' 
                        : 'bg-gray-300 dark:bg-gray-700 hover:bg-gray-400 dark:hover:bg-gray-500'
                }`;
                dot.title = `Ir para o slide ${index + 1}`;
                dotsContainer.appendChild(dot);
            });
        }

        // Minimizar ou expandir notas do orador
        function toggleSpeakerDrawer() {
            const drawerContent = document.getElementById('speaker-drawer-content');
            const arrow = document.getElementById('drawer-arrow');

            if (isSpeakerNotesCollapsed) {
                drawerContent.classList.remove('hidden');
                arrow.classList.remove('rotate-180');
                isSpeakerNotesCollapsed = false;
            } else {
                drawerContent.classList.add('hidden');
                arrow.classList.add('rotate-180');
                isSpeakerNotesCollapsed = true;
            }
        }

        // Controlo de tamanho de fonte das notas
        function changeFontSize(delta) {
            presenterFontSize = Math.max(11, Math.min(26, presenterFontSize + delta));
            const fontLabel = document.getElementById('font-size-label');
            const scriptContainer = document.getElementById('speaker-drawer-content');

            fontLabel.textContent = `${presenterFontSize}px`;
            scriptContainer.style.fontSize = `${presenterFontSize}px`;
        }

            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
            } else {
                html.classList.add('dark');
            }
        }

        // Entrar no modo Ecrã Inteiro (Fullscreen)
        function enterFullscreenMode() {
            isFullscreenMode = true;
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('speaker-drawer').classList.add('hidden');
            document.getElementById('slide-header').classList.add('hidden');
            document.getElementById('slide-controls').classList.add('hidden');
            document.getElementById('theme-toggle-container').classList.add('hidden');
            document.getElementById('exit-fullscreen-btn').classList.remove('hidden');

            // Escala de exibição máxima do viewport
            const slideViewport = document.getElementById('slide-viewport');
            slideViewport.classList.add('fullscreen-active');
            slideViewport.classList.remove('md:max-w-5xl', 'lg:max-w-6xl', 'min-h-[500px]', 'md:min-h-[620px]', 'lg:min-h-[680px]');
            slideViewport.classList.add('w-screen', 'h-screen', 'border-0', 'rounded-none', 'p-12', 'md:p-20', 'lg:p-28');
            
            showToast("Ecrã inteiro ativado. Pressione ESC ou F para sair.");
        }

        // Sair do modo Ecrã Inteiro
        function exitFullscreenMode() {
            isFullscreenMode = false;
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('speaker-drawer').classList.remove('hidden');
            document.getElementById('slide-header').classList.remove('hidden');
            document.getElementById('slide-controls').classList.remove('hidden');
            document.getElementById('theme-toggle-container').classList.remove('hidden');
            document.getElementById('exit-fullscreen-btn').classList.add('hidden');

            const slideViewport = document.getElementById('slide-viewport');
            slideViewport.classList.remove('fullscreen-active');
            slideViewport.classList.remove('w-screen', 'h-screen', 'border-0', 'rounded-none', 'p-12', 'md:p-20', 'lg:p-28');
            slideViewport.classList.add('md:max-w-5xl', 'lg:max-w-6xl', 'min-h-[500px]', 'md:min-h-[620px]', 'lg:min-h-[680px]');
        }

        // Configuração de navegação e atalhos por teclado
        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === 'Space') {
                    e.preventDefault();
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    prevSlide();
                } else if (e.key === 'Escape' && isFullscreenMode) {
                    e.preventDefault();
                    exitFullscreenMode();
                } else if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    if (isFullscreenMode) {
                        exitFullscreenMode();
                    } else {
                        enterFullscreenMode();
                    }
                }
            });
        }

        // Configuração de gestos de deslize para dispositivos móveis
        function setupTouchGestures() {
            const slideViewport = document.getElementById('slide-viewport');

            slideViewport.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            slideViewport.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipeGesture();
            }, { passive: true });
        }

        function handleSwipeGesture() {
            const minSwipeDistance = 50;
            const diffX = touchStartX - touchEndX;

            if (Math.abs(diffX) > minSwipeDistance) {
                if (diffX > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }
        }

        // Dispara uma notificação visual Toast temporária
        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            const toastMsg = document.getElementById('toast-message');
            
            toastMsg.textContent = message;
            toast.className = "fixed bottom-6 left-6 z-50 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl border border-gray-800 text-xs font-mono translate-y-0 opacity-100 transition-all duration-300 pointer-events-auto flex items-center space-x-3";
            
            setTimeout(() => {
                toast.className = "fixed bottom-6 left-6 z-50 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl border border-gray-800 text-xs font-mono translate-y-24 opacity-0 transition-all duration-300 pointer-events-none flex items-center space-x-3";
            }, 3000);
        }
    </script>
</body>
</html>
